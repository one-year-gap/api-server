spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jooq.JooqAutoConfiguration

  flyway:
    user: ${DB_USER_MIGRATOR:db_migrator}
    password: ${DB_PASS_MIGRATOR:db_migrator_pw}

server:
  port: ${SERVER_PORT:8080}

app:
  runtime: customer
  admin:
    base-url: ${ADMIN_BASE_URL:http://admin-api.holliverse.internal:8081}
    log-features-path: ${ADMIN_LOG_FEATURES_PATH:/internal/v1/log-features}
    connect-timeout-ms: ${ADMIN_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ADMIN_READ_TIMEOUT_MS:5000}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-characters}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:604800000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}

logging:
  level:
    # 추천 서비스 전체 흐름 추적용
    site.holliverse.customer.application.usecase.recommendation.RecommendationService: INFO
    # Kafka recommendation-topic Consumer 동작 확인용
    site.holliverse.infra.kafka.consumer.RecommendationKafkaConsumer: DEBUG

app:
  oauth2:
    onboarding-redirect-uri: ${APP_OAUTH2_ONBOARDING_REDIRECT_URI:http://localhost:8080/test/onboarding}
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:8080/test/callback}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-at-least-32-characters}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:604800000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:1209600000}
  team: ${APP_TEAM:unknown-team}
  version: ${APP_VERSION:latest} #현재 release version 명시
  logging:
    member-hash-salt: ${APP_LOGGING_MEMBER_HASH_SALT:change-me-local}

  #Discord
  alerts:
    relay-enabled: true
    relay-secret: ${APP_ALERT_RELAY_SECRET:local}
    notify-cooldown-seconds: 120
    owner-discord-users:
      bm: ${ALERT_OWNER_BM:1234}
      dy: ${ALERT_OWNER_DY:1234}
      yh: ${ALERT_OWNER_YH:1234}
      hy: ${ALERT_OWNER_HY:1234}
    discord:
      enabled: true
      bot-token: ${DISCORD_BOT_TOKEN:token}
      api-base-uri: ${DISCORD_BASE_URI:uri}


# =================================================================
# FastAPI (LLM 추천) 연동
# =================================================================
external:
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
    connect-timeout-ms: ${FASTAPI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${FASTAPI_READ_TIMEOUT_MS:60000}
  solapi:
    base-url: ${SOLAPI_BASE_URL:https://api.solapi.com}
    api-key: ${SOLAPI_API_KEY:}
    api-secret: ${SOLAPI_API_SECRET:}
    sender-phone: ${SOLAPI_SENDER_PHONE:}
    allowed-test-phones:
      - ${SOLAPI_ALLOWED_TEST_PHONE_1:}
      - ${SOLAPI_ALLOWED_TEST_PHONE_2:}
      - ${SOLAPI_ALLOWED_TEST_PHONE_3:}
    connect-timeout-ms: ${SOLAPI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${SOLAPI_READ_TIMEOUT_MS:10000}

# =================================================================
# Security & Encryption Configuration
# - secret-key: 32byte 필수 (AES-256 기준)
# - 환경변수 설정 시: SECRET_KEY, ALGORITHM, TRANSFORMATION
# =================================================================
secret-key: ${SECRET_KEY:Xy9zPvQ3kL5mRnJwT8bH2cD4fG7jA1sE}
algorithm: ${ALGORITHM:AES}
transformation: ${TRANSFORMATION:AES/ECB/PKCS5Padding}

spring:
  #AWS Secret Manager
  config:
    import:
      - optional:aws-secretsmanager:holliverse/api-server/runtime
      - optional:aws-secretsmanager:${KAFKA_SECRET_NAME:holliverse/api-server/kafka}
      - optional:classpath:application.kafka.yml
  cloud:
    aws:
      region:
        static: ap-northeast-2
      stack:
        auto: false

  application:
    name: holliverse-api-server

  profiles:
    default: customer

  #DataBase
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/holliverse}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 3000
      validation-timeout: 1000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas:

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            authorization-grant-type: authorization_code
            scope: [ profile, email ]


server:
  port: 8080


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      app: api-server
      profile: ${SPRING_PROFILES_ACTIVE:unknown}
      application: ${spring.application.name}-${SPRING_PROFILES_ACTIVE:unknown}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        holliverse.operation.duration: true
        holliverse.outbound.http.duration: true
        holliverse.recommendation.wait.duration: true
        holliverse.kafka.consume.duration: true
      slo:
        http.server.requests: 100ms,300ms,500ms,1s,3s
        holliverse.operation.duration: 10ms,50ms,100ms,300ms,1s,3s
        holliverse.outbound.http.duration: 50ms,100ms,300ms,1s,3s,10s
        holliverse.recommendation.wait.duration: 100ms,500ms,1s,3s,10s,30s,90s
        holliverse.kafka.consume.duration: 10ms,50ms,100ms,300ms,1s,3s
    export:
      cloudwatch:
        enabled: true
        namespace: HSC/Spring
        step: 1m
  endpoint:
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
    health:
      probes:
        enabled: true


